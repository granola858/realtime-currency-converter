<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real-time Currency Converter</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <style>
        /* 基本樣式重設 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* 移除手機點擊高亮 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            /* 手機版邊距縮小 */
        }

        /* 主容器 */
        .converter-container {
            width: 100%;
            max-width: 900px;
            background-color: #ffffff;
            padding: 25px 20px;
            /* 手機版內距縮小 */
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        header h1 {
            font-size: 1.5rem;
            /* 手機版標題縮小 */
            color: #2c3e50;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .update-time {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 6px;
            padding: 0 10px;
            color: #7f8c8d;
            flex-wrap: wrap;
        }

        .update-time-label {
            font-size: 0.82rem;
            font-weight: 500;
            color: #8a98a6;
        }

        .update-time-value {
            font-size: 1rem;
            font-weight: 700;
            color: #4f6478;
            letter-spacing: 0.01em;
        }

        /* 輸入組的容器 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            /* 間距微調 */
        }

        /* 每個貨幣輸入組 */
        .currency-group {
            display: flex;
            align-items: center;
            /* 垂直置中 */
            background-color: #f9f9f9;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
            height: 60px;
            /* 固定高度確保整齊 */
        }

        .currency-group:focus-within {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        /* 金額輸入框 */
        .currency-input {
            flex: 1;
            /* 佔據剩餘空間 */
            min-width: 0;
            /* 關鍵：防止內容過長撐爆 Flex 容器 */
            height: 100%;
            padding: 0 15px;
            font-size: 1.1rem;
            border: none;
            outline: none;
            background-color: transparent;
            color: #2c3e50;
            font-weight: 500;
        }

        .currency-input[readonly] {
            color: #95a5a6;
            cursor: default;
        }

        /* 移除 input 數字調整按鈕 */
        .currency-input::-webkit-outer-spin-button,
        .currency-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* --- 鎖定按鈕核心樣式 (新版細長型) --- */
        .lock-btn {
            background: #e9ecef;
            border: none;
            border-left: 1px solid #e0e0e0;
            width: 40px;
            /* 手機版稍微縮窄 */
            height: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: #27ae60;
            /* 預設綠色 (開啟) */
            flex-shrink: 0;
            /* 防止被壓縮 */
        }

        /* SVG 設定 */
        .lock-btn svg {
            width: 22px;
            height: 22px;
            display: block;
            overflow: visible;
            /* 允許旋轉時稍微超出 SVG 框 */
        }

        /* --- 細長鎖頭動畫核心 --- */
        .lock-body {
            fill: currentColor;
        }

        .lock-shackle {
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            /* 線條變細 */
            stroke-linecap: round;

            /* 旋轉軸心：右腳 (右邊柱子當支點) */
            transform-origin: 16px 11px;
            /* 讓 3D 翻轉時繞垂直軸更立體 */
            transform-style: preserve-3d;
            /* 預設靜止狀態 = 已開啟 (提起並轉開 180 度回到完整 U 形) */
            transform: perspective(320px) translateY(-2px) rotateY(180deg);
        }

        /* 開鎖：先向上提起，再以右柱為支點往右立體翻轉 */
        @keyframes shackle-unlock {
            0% {
                transform: perspective(320px) translateY(0) rotateY(0deg);
            }

            45% {
                /* 第一段：垂直提起 */
                transform: perspective(320px) translateY(-2px) rotateY(0deg);
            }

            100% {
                /* 第二段：以右柱為軸轉開整整 180 度，回到完整 U 形 */
                transform: perspective(320px) translateY(-2px) rotateY(180deg);
            }
        }

        /* 上鎖：先轉回正面，再落下扣合 */
        @keyframes shackle-lock {
            0% {
                transform: perspective(320px) translateY(-2px) rotateY(180deg);
            }

            55% {
                transform: perspective(320px) translateY(-2px) rotateY(0deg);
            }

            100% {
                transform: perspective(320px) translateY(0) rotateY(0deg);
            }
        }

        /* 狀態 A: 預設 (開啟) - 提起並立體轉開 (排除鎖定與禁用，確保動畫切換乾淨) */
        .lock-btn:not(.active):not(:disabled) .lock-shackle {
            transform: perspective(320px) translateY(-2px) rotateY(180deg);
        }

        /* 狀態 B: 鎖定 (紅色) */
        .lock-btn.active {
            color: #e74c3c;
            background-color: #ffeaea;
        }

        /* 鎖定時：轉回並落下閉合 */
        .lock-btn.active .lock-shackle {
            transform: perspective(320px) translateY(0) rotateY(0deg);
        }

        /* 狀態 C: 禁用 (灰色) */
        .lock-btn:disabled {
            cursor: not-allowed;
            color: #bdc3c7;
            background-color: #f0f0f0;
        }

        /* 禁用列同樣播放關閉動畫，跟著一起扣合 */
        .lock-btn:disabled .lock-shackle {
            transform: perspective(320px) translateY(0) rotateY(0deg);
        }

        .lock-btn.is-unlocking .lock-shackle {
            animation: shackle-unlock 0.5s cubic-bezier(0.34, 1.3, 0.64, 1) forwards;
        }

        .lock-btn.is-locking .lock-shackle {
            animation: shackle-lock 0.4s cubic-bezier(0.4, 0, 0.4, 1) forwards;
        }

        /* 貨幣下拉選單 */
        .currency-select {
            height: 100%;
            padding: 0 15px 0 10px;
            font-size: 0.95rem;
            border: none;
            background-color: #e9ecef;
            outline: none;
            cursor: pointer;
            font-weight: 600;
            color: #555;
            transition: background-color 0.3s ease;
            border-left: none;
            flex-shrink: 0;
            /* 防止被壓縮 */
            max-width: 90px;
            /* 限制最大寬度 */
        }

        .currency-select:hover {
            background-color: #dfe4e7;
        }

        .currency-select:disabled {
            background-color: #f0f0f0;
            color: #999;
            cursor: not-allowed;
        }

        .lock-btn:hover:not(:disabled) {
            background-color: #dfe4e7;
        }

        /* 頁腳 */
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #95a5a6;
            line-height: 1.5;
        }

        footer a {
            color: #3498db;
            text-decoration: none;
        }

        .status-message {
            min-height: 1.2em;
            margin-top: 8px;
            color: #c0392b;
        }

        /* --- 主題切換按鈕 --- */
        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease;
            color: #555;
        }

        .theme-toggle:hover {
            background-color: rgba(0, 0, 0, 0.06);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
        }

        .icon-sun {
            display: none;
        }

        .icon-moon {
            display: block;
        }

        /* --- 深色模式 --- */
        .dark {
            color-scheme: dark;
        }

        .dark body {
            background-color: #0f1117;
            color: #e0e6f0;
        }

        .dark .converter-container {
            background-color: #1a1d27;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .dark header h1 {
            color: #c8d4e0;
        }

        .dark .update-time {
            color: #8892a0;
        }

        .dark .update-time-label {
            color: #6a7a8a;
        }

        .dark .update-time-value {
            color: #8a9db0;
        }

        .dark .currency-group {
            background-color: #22253a;
            border-color: #3a3f58;
        }

        .dark .currency-group:focus-within {
            border-color: #5ba8db;
            box-shadow: 0 0 0 3px rgba(91, 168, 219, 0.2);
        }

        .dark .currency-input {
            color: #c8d4e0;
        }

        .dark .currency-input[readonly] {
            color: #6a7585;
        }

        .dark .lock-btn {
            background: #2c3050;
            border-left-color: #3a3f58;
            color: #2ecc71;
        }

        .dark .lock-btn:hover:not(:disabled) {
            background-color: #363a5a;
        }

        .dark .lock-btn.active {
            color: #e74c3c;
            background-color: #3d1a1a;
        }

        .dark .lock-btn:disabled {
            color: #4a5068;
            background-color: #1e2138;
        }

        .dark .currency-select {
            background-color: #2c3050;
            color: #b0bcc8;
        }

        .dark .currency-select:hover {
            background-color: #363a5a;
        }

        .dark .currency-select:disabled {
            background-color: #1e2138;
            color: #4a5068;
        }

        .dark footer {
            color: #6a7585;
        }

        .dark footer a {
            color: #5ba8db;
        }

        .dark .status-message {
            color: #e07070;
        }

        .dark .theme-toggle {
            color: #c8d4e0;
        }

        .dark .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .dark .icon-sun {
            display: block;
        }

        .dark .icon-moon {
            display: none;
        }

        /* --- RWD 響應式設計 --- */

        /* 平板以上 (大於 768px) */
        @media (min-width: 768px) {
            body {
                padding: 40px;
            }

            .converter-container {
                padding: 40px 50px;
            }

            .main-content {
                grid-template-columns: repeat(2, 1fr);
                gap: 25px;
            }

            header h1 {
                font-size: 2.2rem;
            }

            .update-time {
                font-size: 1rem;
            }

            .update-time-label {
                font-size: 0.88rem;
            }

            .update-time-value {
                font-size: 1.08rem;
            }

            .currency-input {
                font-size: 1.3rem;
            }

            .currency-select {
                font-size: 1rem;
                padding: 0 20px 0 15px;
                max-width: none;
            }

            .lock-btn {
                width: 48px;
                /* 電腦版按鈕寬一點 */
            }

            .lock-btn svg {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>

<body>

    <div class="converter-container">
        <header>
            <button id="theme-toggle" class="theme-toggle" title="切換深色模式" aria-label="切換深色模式">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
            </button>
            <h1>Real-time Converter</h1>
            <p id="last-updated" class="update-time">
                <span class="update-time-label">Provider rates last updated:</span>
                <span id="last-updated-value" class="update-time-value">--</span>
            </p>
        </header>

        <main id="main-container" class="main-content">
        </main>

        <footer>
            <p>Data from <a href="https://www.exchangerate-api.com" target="_blank"
                    rel="noreferrer">ExchangeRate-API</a>. Exchange rates are provided for informational purposes only
                and may be delayed or inaccurate.<br>
                Copyright © 2026 <a href="mailto:granola858@gmail.com" target="_blank">AYuanH</a>
            </p>
            <p id="status-message" class="status-message" aria-live="polite"></p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 深色模式切換
            const themeToggleBtn = document.getElementById('theme-toggle');
            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            });

            const CACHE_TTL_MS = 60 * 1000;
            const currencyFormatter = new Intl.NumberFormat('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            const updateTimeFormatter = new Intl.DateTimeFormat('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                timeZoneName: 'short'
            });

            const mainContainer = document.getElementById('main-container');
            const lastUpdatedElement = document.getElementById('last-updated');
            const lastUpdatedValueElement = document.getElementById('last-updated-value');
            const statusMessageElement = document.getElementById('status-message');
            const currencyElements = [];
            const ratesCache = new Map();
            const pendingRateRequests = new Map();
            const totalConverters = 6;
            const lockedCurrencyStorageKey = 'lockedCurrencyIndex';
            let isUpdating = false;
            let lockedIndex = null;
            let activeRequestId = 0;
            const defaultCurrencies = ['TWD', 'JPY', 'USD', 'THB', 'VND', 'HKD'];

            // 新版 SVG：細長風格
            // 鎖環 (shackle) 畫在鎖體 (body) 之前 → 鎖體會蓋住鎖腳根部，
            // 提起/翻轉時看不到腳與鎖體分離。
            // 左腳較短 (到 y=11)：上提時會脫離鎖體、露出分離。
            // 右腳較長 (到 y=13.5)：深入鎖體，當作旋轉支點、保持錨定。
            const slimLockSVG = `
                <svg viewBox="0 0 24 24">
                    <path class="lock-shackle" d="M8 11 V6 a4 4 0 0 1 8 0 v7.5" />
                    <path class="lock-body" d="M7 11 h10 a2 2 0 0 1 2 2 v8 a2 2 0 0 1-2 2 H7 a2 2 0 0 1-2-2 v-8 a2 2 0 0 1 2-2 z" />
                    <circle cx="12" cy="17" r="1.5" fill="#ffffff" opacity="0.8"/>
                </svg>`;

            function createConverterElement(index) {
                const group = document.createElement('div');
                group.className = 'currency-group';
                group.dataset.id = index;

                const input = document.createElement('input');
                input.type = 'text';
                input.inputMode = 'decimal'; // 手機上會跳出數字鍵盤
                input.className = 'currency-input';
                input.placeholder = '0.00';
                input.dataset.id = index;

                const lockBtn = document.createElement('button');
                lockBtn.type = 'button';
                lockBtn.className = 'lock-btn';
                lockBtn.innerHTML = slimLockSVG;
                lockBtn.title = "Lock Currency";
                lockBtn.setAttribute('aria-label', 'Lock currency row');
                lockBtn.dataset.id = index;
                lockBtn.addEventListener('animationend', () => {
                    lockBtn.classList.remove('is-locking', 'is-unlocking');
                });

                const select = document.createElement('select');
                select.className = 'currency-select';
                select.dataset.id = index;

                group.appendChild(input);
                group.appendChild(lockBtn);
                group.appendChild(select);

                return { group, input, select, lockBtn };
            }

            function setStatusMessage(message = '') {
                statusMessageElement.textContent = message;
            }

            function updateLastUpdated(data) {
                const timestamp = Number.isFinite(data?.time_last_update_unix)
                    ? data.time_last_update_unix * 1000
                    : Date.now();

                lastUpdatedValueElement.textContent = updateTimeFormatter.format(timestamp);
            }

            function parseAmount(value) {
                const normalizedValue = value.replace(/,/g, '').trim();
                if (!normalizedValue) {
                    return NaN;
                }

                return Number(normalizedValue);
            }

            function formatAmount(value) {
                return currencyFormatter.format(value);
            }

            function clearConvertedValues(sourceIndex) {
                currencyElements.forEach((el, index) => {
                    if (index !== sourceIndex) {
                        el.input.value = '';
                    }
                });
            }

            async function fetchRates(baseCurrency) {
                const cachedEntry = ratesCache.get(baseCurrency);
                if (cachedEntry && (Date.now() - cachedEntry.fetchedAt) < CACHE_TTL_MS) {
                    return cachedEntry.data;
                }

                const pendingRequest = pendingRateRequests.get(baseCurrency);
                if (pendingRequest) {
                    return pendingRequest;
                }

                const request = fetch(`https://open.er-api.com/v6/latest/${baseCurrency}`)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok');
                        }

                        return response.json();
                    })
                    .then(data => {
                        if (data.result !== 'success') {
                            throw new Error('Failed to fetch exchange rates');
                        }

                        ratesCache.set(baseCurrency, {
                            data,
                            fetchedAt: Date.now()
                        });

                        return data;
                    })
                    .finally(() => {
                        pendingRateRequests.delete(baseCurrency);
                    });

                pendingRateRequests.set(baseCurrency, request);

                return request;
            }

            function getSavedLockedIndex() {
                const savedLockedIndex = Number.parseInt(localStorage.getItem(lockedCurrencyStorageKey), 10);

                if (Number.isInteger(savedLockedIndex) && savedLockedIndex >= 0 && savedLockedIndex < totalConverters) {
                    return savedLockedIndex;
                }

                return null;
            }

            function saveLockedIndexToLocalStorage() {
                if (lockedIndex === null) {
                    localStorage.removeItem(lockedCurrencyStorageKey);
                    return;
                }

                localStorage.setItem(lockedCurrencyStorageKey, String(lockedIndex));
            }

            function updateLockUI({ animate = false, previousLockedIndex = null } = {}) {
                const shouldAnimateLocking = animate && previousLockedIndex === null && lockedIndex !== null;
                const shouldAnimateUnlocking = animate && previousLockedIndex !== null && lockedIndex === null;

                currencyElements.forEach((el, index) => {
                    const isLockedRow = (index === lockedIndex);
                    const isAnyLocked = (lockedIndex !== null);

                    el.lockBtn.classList.remove('is-locking', 'is-unlocking');

                    if (isLockedRow) {
                        el.lockBtn.classList.add('active');
                        el.lockBtn.disabled = false;
                    } else {
                        el.lockBtn.classList.remove('active');

                        if (isAnyLocked) {
                            el.lockBtn.disabled = true;
                        } else {
                            el.lockBtn.disabled = false;
                        }
                    }

                    if (isLockedRow) {
                        el.input.removeAttribute('readonly');
                        el.select.disabled = true;
                    } else {
                        if (isAnyLocked) {
                            el.input.setAttribute('readonly', true);
                        } else {
                            el.input.removeAttribute('readonly');
                        }
                        el.select.disabled = false;
                    }

                    if (shouldAnimateLocking) {
                        void el.lockBtn.offsetWidth;
                        el.lockBtn.classList.add('is-locking');
                    }

                    if (shouldAnimateUnlocking) {
                        void el.lockBtn.offsetWidth;
                        el.lockBtn.classList.add('is-unlocking');
                    }
                });
            }

            function getActiveCurrencies() {
                let savedCurrencies;
                try {
                    savedCurrencies = JSON.parse(localStorage.getItem('selectedCurrencies'));
                } catch (e) {
                    console.error("Failed to parse saved currencies", e);
                }
                if (Array.isArray(savedCurrencies) && savedCurrencies.length === totalConverters) {
                    return savedCurrencies;
                }
                return [...defaultCurrencies];
            }

            function saveCurrenciesToLocalStorage() {
                const currencies = currencyElements.map(el => el.select.value);
                localStorage.setItem('selectedCurrencies', JSON.stringify(currencies));
            }

            async function populateCurrencyOptions() {
                try {
                    const data = await fetchRates('USD');

                    const currencyCodes = Object.keys(data.rates);
                    const currencyOptions = currencyCodes.map(code =>
                        `<option value="${code}">${code}</option>`
                    ).join('');

                    const activeCurrencies = getActiveCurrencies();

                    currencyElements.forEach(({ select }, index) => {
                        select.innerHTML = currencyOptions;
                        if (index < activeCurrencies.length) {
                            select.value = activeCurrencies[index];
                        }
                    });

                    updateLastUpdated(data);
                    setStatusMessage('');

                } catch (error) {
                    console.error("Currency data fetch failed:", error.message);
                    mainContainer.innerHTML = '<p style="color: red; text-align:center;">Failed to load currency data. Please try again later.</p>';
                    setStatusMessage('目前無法載入貨幣資料。');
                }
            }

            async function handleConversion(sourceIndex) {
                if (isUpdating) return;

                const effectiveSourceIndex = (lockedIndex !== null) ? lockedIndex : sourceIndex;
                const requestId = ++activeRequestId;

                const sourceInput = currencyElements[effectiveSourceIndex].input;
                const sourceSelect = currencyElements[effectiveSourceIndex].select;

                const amount = parseAmount(sourceInput.value);
                const baseCurrency = sourceSelect.value;

                if (Number.isNaN(amount) || amount < 0) {
                    isUpdating = true;
                    clearConvertedValues(effectiveSourceIndex);
                    setStatusMessage('');
                    isUpdating = false;
                    return;
                }

                try {
                    const data = await fetchRates(baseCurrency);

                    if (requestId !== activeRequestId) {
                        return;
                    }

                    const rates = data.rates;
                    isUpdating = true;

                    currencyElements.forEach((el, index) => {
                        if (index !== effectiveSourceIndex) {
                            const targetCurrency = el.select.value;
                            const rate = rates[targetCurrency];

                            if (typeof rate !== 'number') {
                                el.input.value = '';
                                return;
                            }

                            const convertedAmount = amount * rate;
                            el.input.value = formatAmount(convertedAmount);
                        }
                    });

                    updateLastUpdated(data);
                    setStatusMessage('');

                } catch (error) {
                    if (requestId !== activeRequestId) {
                        return;
                    }

                    isUpdating = true;
                    clearConvertedValues(effectiveSourceIndex);
                    setStatusMessage('無法更新匯率，請稍後再試。');
                    console.error("Conversion error:", error.message);
                } finally {
                    isUpdating = false;
                }
            }

            async function init() {
                lockedIndex = getSavedLockedIndex();

                for (let i = 0; i < totalConverters; i++) {
                    const { group, input, select, lockBtn } = createConverterElement(i);
                    mainContainer.appendChild(group);
                    currencyElements.push({ input, select, lockBtn });

                    lockBtn.addEventListener('click', () => {
                        const previousLockedIndex = lockedIndex;

                        if (lockedIndex === i) {
                            lockedIndex = null;
                        } else {
                            lockedIndex = i;
                            handleConversion(i);
                        }

                        saveLockedIndexToLocalStorage();
                        updateLockUI({ animate: true, previousLockedIndex });
                    });

                    input.addEventListener('input', (e) => {
                        if (lockedIndex !== null && lockedIndex !== i) return;
                        handleConversion(i);
                    });

                    select.addEventListener('change', (e) => {
                        saveCurrenciesToLocalStorage();
                        handleConversion(i);
                    });

                    input.addEventListener('focus', (e) => {
                        if (lockedIndex !== null && lockedIndex !== i) return;

                        if (e.target.value) {
                            isUpdating = true;
                            e.target.value = e.target.value.replace(/,/g, '');
                            isUpdating = false;
                        }
                    });

                    input.addEventListener('blur', (e) => {
                        if (lockedIndex !== null && lockedIndex !== i) return;

                        if (e.target.value) {
                            const num = parseFloat(e.target.value.replace(/,/g, ''));
                            if (!isNaN(num)) {
                                isUpdating = true;
                                e.target.value = formatAmount(num);
                                isUpdating = false;
                            }
                        }
                    });
                }

                await populateCurrencyOptions();
                updateLockUI();
            }

            init();
        });
    </script>
</body>

</html>
